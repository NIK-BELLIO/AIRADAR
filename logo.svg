<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI Radar">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f3dca0"/>
      <stop offset="0.5" stop-color="#d8b76a"/>
      <stop offset="1" stop-color="#a8843f"/>
    </linearGradient>
    <linearGradient id="sweep" x1="32" y1="32" x2="32" y2="6" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d8b76a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#d8b76a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- concentric radar rings -->
  <circle cx="32" cy="32" r="25" fill="none" stroke="url(#gold)" stroke-width="1.6" opacity="0.9"/>
  <circle cx="32" cy="32" r="17" fill="none" stroke="url(#gold)" stroke-width="1.3" opacity="0.65"/>
  <circle cx="32" cy="32" r="9" fill="none" stroke="url(#gold)" stroke-width="1.1" opacity="0.45"/>
  <!-- cross hairs -->
  <line x1="32" y1="5" x2="32" y2="59" stroke="url(#gold)" stroke-width="0.9" opacity="0.35"/>
  <line x1="5" y1="32" x2="59" y2="32" stroke="url(#gold)" stroke-width="0.9" opacity="0.35"/>
  <!-- radar sweep wedge -->
  <path d="M32 32 L32 7 A25 25 0 0 1 53.7 19.5 Z" fill="url(#sweep)"/>
  <!-- sweep leading edge -->
  <line x1="32" y1="32" x2="32" y2="7" stroke="url(#gold)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- detected blip -->
  <circle cx="44" cy="22" r="3.1" fill="url(#gold)"/>
  <circle cx="44" cy="22" r="5.4" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>
  <!-- centre point -->
  <circle cx="32" cy="32" r="2.4" fill="url(#gold)"/>
</svg>
