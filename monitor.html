<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Radar — Live World Monitor</title>
<meta name="description" content="A live intelligence globe: earthquakes, natural events, humanitarian crises and breaking world headlines in real time." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prata&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/globe.gl"></script>
<style>
  :root{
    --bg:#06060a; --panel:rgba(16,16,22,.72); --line:rgba(37,99,255,.16);
    --ink:#efe9dc; --muted:#938d81; --gold:#2563ff; --green:#35d07f;
    --quake:#e8a13a; --crisis:#e0564b; --nat:#ff6b35; --news:#6aa9d8;
    --serif:'Prata',Georgia,serif; --sans:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:
      radial-gradient(1200px 700px at 60% -10%, rgba(40,33,16,.5), transparent 60%),
      radial-gradient(900px 600px at 10% 110%, rgba(20,30,40,.4), transparent 60%),
      var(--bg);
    color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow:hidden}
  a{color:inherit;text-decoration:none}

  /* command bar */
  .bar{display:flex;align-items:center;gap:16px;padding:11px 18px;
    border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(12,12,16,.9),rgba(8,8,10,.65));
    position:relative;z-index:1200;backdrop-filter:blur(8px)}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .mark{width:30px;height:30px;border-radius:8px;flex:none;
    background:radial-gradient(circle at 30% 30%,#241d10,#0c0a06);
    border:1px solid rgba(37,99,255,.4);display:grid;place-items:center}
  .brand .mark::before{content:"";width:9px;height:9px;border-radius:50%;
    background:var(--green);box-shadow:0 0 0 0 rgba(53,208,127,.6);animation:pulse 1.8s infinite}
  .brand .t{font-family:var(--serif);font-size:19px;line-height:1;white-space:nowrap}
  .brand .s{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-top:3px}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(53,208,127,.55)}70%{box-shadow:0 0 0 8px rgba(53,208,127,0)}100%{box-shadow:0 0 0 0 rgba(53,208,127,0)}}
  .bar .spacer{flex:1}
  .kpi{display:flex;gap:20px;align-items:center}
  .kpi .k{text-align:right;line-height:1}
  .kpi .k b{font-family:var(--serif);font-size:20px;font-weight:400;display:block;font-variant-numeric:tabular-nums}
  .kpi .k span{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .kpi .k.q b{color:var(--quake)} .kpi .k.n b{color:var(--nat)} .kpi .k.c b{color:var(--crisis)}
  .status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
  .status .dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.8s infinite}
  .clock{font-variant-numeric:tabular-nums;font-weight:600;font-size:13px;letter-spacing:.04em}
  .btn{font:inherit;font-size:12.5px;font-weight:600;color:var(--ink);cursor:pointer;
    background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:9px;
    padding:8px 13px;display:inline-flex;align-items:center;gap:7px;transition:.18s}
  .btn:hover{background:rgba(37,99,255,.12);border-color:rgba(37,99,255,.4)}
  .btn .ic{width:14px;height:14px}

  /* layout */
  .wrap{display:flex;height:calc(100vh - 54px - 42px);position:relative}
  #globe{flex:1;position:relative;cursor:grab}
  #globe:active{cursor:grabbing}
  .globe-tip{position:absolute;left:18px;bottom:14px;font-size:11px;color:var(--muted);z-index:5;
    background:rgba(8,8,10,.5);padding:6px 10px;border-radius:8px;border:1px solid var(--line)}
  .rail{width:392px;flex:none;border-left:1px solid var(--line);background:var(--panel);
    display:flex;flex-direction:column;min-height:0;backdrop-filter:blur(10px)}

  .layers{display:flex;gap:8px;padding:12px 14px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .lyr{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;cursor:pointer;
    padding:6px 11px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.03);
    user-select:none;transition:.15s}
  .lyr input{display:none}
  .lyr .sw{width:9px;height:9px;border-radius:50%;flex:none}
  .lyr[data-k="quake"] .sw{background:var(--quake)}
  .lyr[data-k="nat"] .sw{background:var(--nat)}
  .lyr[data-k="crisis"] .sw{background:var(--crisis)}
  .lyr[data-k="news"] .sw{background:var(--news)}
  .lyr.off{opacity:.38}
  .lyr .ct{color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums}

  .feed-head{display:flex;align-items:baseline;justify-content:space-between;padding:13px 16px 7px}
  .feed-head h2{margin:0;font-family:var(--serif);font-size:16px;font-weight:400}
  .feed-head .sub{font-size:11px;color:var(--muted)}
  .feed{flex:1;overflow-y:auto;padding:2px 10px 16px}
  .feed::-webkit-scrollbar{width:8px}
  .feed::-webkit-scrollbar-thumb{background:rgba(37,99,255,.2);border-radius:8px}
  .item{display:grid;grid-template-columns:34px 1fr;gap:11px;padding:11px 8px;border-radius:11px;
    cursor:pointer;transition:.14s;border:1px solid transparent}
  .item:hover{background:rgba(37,99,255,.06);border-color:var(--line)}
  .item .ico{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex:none;
    font-weight:800;font-size:13px;font-variant-numeric:tabular-nums}
  .item.quake .ico{background:rgba(232,161,58,.14);color:var(--quake);border:1px solid rgba(232,161,58,.35)}
  .item.nat .ico{background:rgba(255,107,53,.14);color:var(--nat);border:1px solid rgba(255,107,53,.35)}
  .item.crisis .ico{background:rgba(224,86,75,.14);color:var(--crisis);border:1px solid rgba(224,86,75,.35)}
  .item.news .ico{background:rgba(106,169,216,.14);color:var(--news);border:1px solid rgba(106,169,216,.35)}
  .item .ttl{font-size:13.5px;line-height:1.34;font-weight:600;color:var(--ink);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .item .meta{font-size:11px;color:var(--muted);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap}
  .item .meta b{color:var(--gold);font-weight:600}
  .item.fresh{animation:flash 2.2s ease-out}
  @keyframes flash{0%{background:rgba(37,99,255,.16)}100%{background:transparent}}
  .empty{padding:30px 16px;text-align:center;color:var(--muted);font-size:13px;line-height:1.6}

  /* ticker */
  .ticker{height:42px;display:flex;align-items:center;border-top:1px solid var(--line);
    background:linear-gradient(180deg,rgba(12,12,16,.92),rgba(7,7,9,.92));overflow:hidden;position:relative;z-index:1200}
  .ticker .tag{flex:none;align-self:stretch;display:flex;align-items:center;gap:8px;padding:0 16px;
    background:var(--crisis);color:#1a0a08;font-weight:800;font-size:11.5px;letter-spacing:.12em;text-transform:uppercase}
  .ticker .tag .d{width:8px;height:8px;border-radius:50%;background:#1a0a08;animation:pulse2 1.2s infinite}
  @keyframes pulse2{50%{opacity:.3}}
  .ticker .track{flex:1;overflow:hidden;white-space:nowrap}
  .ticker .move{display:inline-block;padding-left:100%;animation:scroll 80s linear infinite}
  .ticker:hover .move{animation-play-state:paused}
  .ticker .move span{font-size:13px;color:var(--ink);margin:0 30px;opacity:.92}
  .ticker .move b{color:var(--gold);margin-right:8px;font-weight:700}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-100%)}}

  @media (max-width:860px){
    .wrap{flex-direction:column;height:auto}
    #globe{height:52vh}
    .rail{width:auto;border-left:none;border-top:1px solid var(--line)}
    .feed{max-height:42vh}
    .kpi{display:none}.brand .s{display:none}
    body{overflow:auto}
  }
</style>
</head>
<body>
  <header class="bar">
    <a class="brand" href="index.html" title="Back to AI Radar">
      <span class="mark"></span>
      <span><span class="t">AI Radar</span><div class="s">Live World Monitor</div></span>
    </a>
    <span class="spacer"></span>
    <div class="kpi">
      <div class="k q"><b id="kQuake">0</b><span>Seismic</span></div>
      <div class="k n"><b id="kNat">0</b><span>Natural</span></div>
      <div class="k c"><b id="kCrisis">0</b><span>Crises</span></div>
    </div>
    <span class="status"><span class="dot"></span><span id="statusTxt">Connecting…</span></span>
    <span class="clock" id="clock">--:--:-- UTC</span>
    <button class="btn" id="rotateBtn" title="Pause / resume rotation">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/></svg>
      <span id="rotateTxt">Spin</span>
    </button>
    <button class="btn" id="refreshBtn" title="Refresh now">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/></svg>
      Refresh
    </button>
    <a class="btn" href="index.html">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Site
    </a>
  </header>

  <div class="wrap">
    <div id="globe"><div class="globe-tip">Drag to rotate · scroll to zoom · click a signal to inspect</div></div>
    <aside class="rail">
      <div class="layers" id="layers">
        <label class="lyr" data-k="quake"><input type="checkbox" checked><span class="sw"></span>Earthquakes <span class="ct" id="ctQuake">0</span></label>
        <label class="lyr" data-k="nat"><input type="checkbox" checked><span class="sw"></span>Natural <span class="ct" id="ctNat">0</span></label>
        <label class="lyr" data-k="crisis"><input type="checkbox" checked><span class="sw"></span>Crises <span class="ct" id="ctCrisis">0</span></label>
        <label class="lyr" data-k="news"><input type="checkbox" checked><span class="sw"></span>Headlines <span class="ct" id="ctNews">0</span></label>
      </div>
      <div class="feed-head"><h2>Live feed</h2><span class="sub" id="updated">—</span></div>
      <div class="feed" id="feed"><div class="empty">Tuning the radar…</div></div>
    </aside>
  </div>

  <div class="ticker">
    <span class="tag"><span class="d"></span>Wire</span>
    <div class="track"><div class="move" id="tickerMove"><span>Loading the latest world headlines…</span></div></div>
  </div>

<script>
(function(){
  "use strict";
  var PROXY = "https://api.allorigins.win/raw?url=";
  var store = { quake:[], nat:[], crisis:[], news:[] }, seen = {}, firstRun = true, world;

  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]; }); }
  function ago(ts){ var d=(Date.now()-ts)/1000; if(d<60)return Math.floor(d)+"s ago";
    if(d<3600)return Math.floor(d/60)+"m ago"; if(d<86400)return Math.floor(d/3600)+"h ago";
    return Math.floor(d/86400)+"d ago"; }
  function setStatus(t){ document.getElementById("statusTxt").textContent=t; }

  function tick(){ document.getElementById("clock").textContent=new Date().toISOString().slice(11,19)+" UTC"; }
  setInterval(tick,1000); tick();

  // ── GLOBE ──
  var globeEl = document.getElementById("globe");
  world = Globe()
    .globeImageUrl("https://unpkg.com/three-globe/example/img/earth-dark.jpg")
    .bumpImageUrl("https://unpkg.com/three-globe/example/img/earth-topology.png")
    .backgroundColor("rgba(0,0,0,0)")
    .showAtmosphere(true).atmosphereColor("#2563ff").atmosphereAltitude(0.16)
    .pointsData([]).pointLat("lat").pointLng("lng").pointColor("color")
    .pointAltitude("alt").pointRadius("r").pointLabel("label").pointsMerge(false)
    .onPointClick(function(p){ focusItem(p.id, true); })
    .ringsData([]).ringColor(function(d){ var c=d.color; return function(t){ return c.replace("ALPHA",(1-t).toFixed(2)); }; })
    .ringMaxRadius("maxR").ringPropagationSpeed("speed").ringRepeatPeriod("period")
    (globeEl);
  world.controls().autoRotate = true;
  world.controls().autoRotateSpeed = 0.35;
  world.controls().enableDamping = true;
  world.pointOfView({ lat:22, lng:14, altitude:2.5 });
  // size to container
  function sizeGlobe(){ world.width(globeEl.clientWidth).height(globeEl.clientHeight); }
  sizeGlobe(); window.addEventListener("resize", sizeGlobe);

  document.getElementById("rotateBtn").addEventListener("click", function(){
    var c=world.controls(); c.autoRotate=!c.autoRotate;
    document.getElementById("rotateTxt").textContent=c.autoRotate?"Spin":"Hold";
  });

  // ── rebuild globe points + rings from current store & toggles ──
  function activeTypes(){ var t={}; document.querySelectorAll(".lyr").forEach(function(l){
    t[l.getAttribute("data-k")]=l.querySelector("input").checked; }); return t; }
  function rgba(hex,a){ var n=parseInt(hex.slice(1),16);
    return "rgba("+((n>>16)&255)+","+((n>>8)&255)+","+(n&255)+","+a+")"; }

  function paintGlobe(){
    var t=activeTypes(), pts=[], rings=[];
    function add(list, col, altF, rF){
      list.forEach(function(x){
        if(x.lat==null||x.lng==null) return;
        pts.push({ id:x.id, lat:x.lat, lng:x.lng, color:col, alt:altF(x), r:rF(x),
          label:'<div style="font:600 12px Inter;background:#14141a;color:#efe9dc;padding:7px 10px;border:1px solid rgba(37,99,255,.3);border-radius:9px;max-width:230px">'+esc(x.title)+'</div>' });
      });
    }
    if(t.quake) add(store.quake, "#e8a13a", function(x){return Math.min(.5,x.mag*0.045);}, function(x){return Math.max(.18,x.mag*0.08);});
    if(t.nat)   add(store.nat,   "#ff6b35", function(){return .12;}, function(){return .28;});
    if(t.crisis)add(store.crisis,"#e0564b", function(){return .08;}, function(){return .34;});
    // pulsing rings on the strongest fresh signals
    function ring(list, hex){ list.slice(0,6).forEach(function(x){ if(x.lat==null)return;
      rings.push({ lat:x.lat, lng:x.lng, color:rgba(hex,1).replace(/[\d.]+\)$/,"ALPHA)"),
        maxR:x.mag?Math.min(6,x.mag):4, speed:2.4, period:1600 }); }); }
    if(t.quake) ring(store.quake.filter(function(x){return x.mag>=4.5;}), "#e8a13a");
    if(t.crisis) ring(store.crisis, "#e0564b");
    world.pointsData(pts).ringsData(rings);
  }

  // ── EARTHQUAKES (USGS) ──
  function loadQuakes(){
    return fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/2.5_day.geojson")
      .then(function(r){ if(!r.ok)throw 0; return r.json(); })
      .then(function(j){ store.quake=(j.features||[]).map(function(f){
        var c=f.geometry&&f.geometry.coordinates; if(!c)return null;
        var id="q"+f.id, fresh=!seen[id]; seen[id]=1;
        return { type:"quake", id:id, mag:f.properties.mag||0, lat:c[1], lng:c[0], fresh:fresh,
          title:"M "+(f.properties.mag||0).toFixed(1)+" — "+(f.properties.place||"Unknown"),
          place:f.properties.place||"", time:f.properties.time, url:f.properties.url };
      }).filter(Boolean);
      document.getElementById("ctQuake").textContent=store.quake.length;
      document.getElementById("kQuake").textContent=store.quake.length; })
      .catch(function(){});
  }

  // ── NATURAL EVENTS (NASA EONET) ──
  var EON={ wildfires:["Wildfire","#ff6b35"], volcanoes:["Volcano","#e0564b"],
    severeStorms:["Storm","#6aa9d8"], floods:["Flood","#4aa3d8"], drought:["Drought","#2563ff"],
    seaLakeIce:["Ice","#9fd6e0"], snow:["Snow","#cfe6f0"], dustHaze:["Dust","#c8a96a"],
    landslides:["Landslide","#b07a4a"], manmade:["Manmade","#999"], earthquakes:["Quake","#e8a13a"],
    waterColor:["Water","#4aa3d8"], temperatureExtremes:["Heat","#e0564b"] };
  function loadNatural(){
    return fetch("https://eonet.gsfc.nasa.gov/api/v3/events?status=open&limit=60")
      .then(function(r){ if(!r.ok)throw 0; return r.json(); })
      .then(function(j){ store.nat=(j.events||[]).map(function(e){
        var cat=(e.categories&&e.categories[0]&&e.categories[0].id)||"manmade";
        if(cat==="earthquakes") return null;             // USGS already covers these
        var g=e.geometry&&e.geometry[e.geometry.length-1]; if(!g||!g.coordinates)return null;
        var coords=g.coordinates, lat, lng;
        if(typeof coords[0]==="number"){ lng=coords[0]; lat=coords[1]; }
        else return null;                                // skip polygons for points
        var info=EON[cat]||["Event","#ff6b35"];
        var id="e"+e.id, fresh=!seen[id]; seen[id]=1;
        return { type:"nat", id:id, lat:lat, lng:lng, fresh:fresh, kind:info[0], color:info[1],
          title:e.title, time:g.date?Date.parse(g.date):Date.now(),
          url:(e.sources&&e.sources[0]&&e.sources[0].url)||"https://eonet.gsfc.nasa.gov" };
      }).filter(Boolean);
      document.getElementById("ctNat").textContent=store.nat.length;
      document.getElementById("kNat").textContent=store.nat.length; })
      .catch(function(){});
  }

  // ── CRISES (ReliefWeb) ──
  function loadCrises(){
    var url="https://api.reliefweb.int/v1/disasters?appname=airadar-monitor&preset=latest&limit=30"
      +"&fields[include][]=name&fields[include][]=status&fields[include][]=date.created"
      +"&fields[include][]=type.name&fields[include][]=primary_country.name&fields[include][]=primary_country.location";
    return fetch(url).then(function(r){ if(!r.ok)throw 0; return r.json(); })
      .then(function(j){ store.crisis=(j.data||[]).map(function(d){
        var fl=d.fields||{}, loc=fl.primary_country&&fl.primary_country.location;
        var lat=loc&&(loc.lat!=null?loc.lat:(loc[0]&&loc[0].lat));
        var lng=loc&&(loc.lon!=null?loc.lon:(loc[0]&&loc[0].lon));
        var id="c"+d.id, fresh=!seen[id]; seen[id]=1;
        return { type:"crisis", id:id, lat:lat, lng:lng, fresh:fresh,
          title:fl.name||"Humanitarian crisis", place:(fl.primary_country&&fl.primary_country.name)||"",
          kind:(fl.type&&fl.type[0]&&fl.type[0].name)||"Disaster",
          time:fl.date&&fl.date.created?new Date(fl.date.created).getTime():Date.now(),
          url:"https://reliefweb.int/disaster/"+d.id };
      });
      document.getElementById("ctCrisis").textContent=store.crisis.length;
      document.getElementById("kCrisis").textContent=store.crisis.length; })
      .catch(function(){});
  }

  // ── HEADLINES (RSS via proxy) ──
  var FEEDS=[ {name:"BBC",url:"https://feeds.bbci.co.uk/news/world/rss.xml"},
              {name:"Al Jazeera",url:"https://www.aljazeera.com/xml/rss/all.xml"} ];
  function loadNews(){
    return Promise.all(FEEDS.map(function(f){
      return fetch(PROXY+encodeURIComponent(f.url)).then(function(r){ if(!r.ok)throw 0; return r.text(); })
        .then(function(xml){ var doc=new DOMParser().parseFromString(xml,"text/xml");
          return Array.prototype.slice.call(doc.querySelectorAll("item")).slice(0,14).map(function(it){
            var g=function(t){ var n=it.querySelector(t); return n?n.textContent:""; };
            return { source:f.name, title:g("title"), link:g("link"), time:Date.parse(g("pubDate"))||Date.now() }; });
        }).catch(function(){ return []; });
    })).then(function(lists){ var all=[]; lists.forEach(function(l){ all=all.concat(l); });
      all.sort(function(a,b){ return b.time-a.time; });
      store.news=all.slice(0,26).map(function(n,i){ var id="n"+(n.link||n.title||i), fresh=!seen[id]; seen[id]=1;
        return { type:"news", id:id, title:n.title, source:n.source, time:n.time, url:n.link, fresh:fresh }; });
      document.getElementById("ctNews").textContent=store.news.length; renderTicker(); })
      .catch(function(){});
  }
  function renderTicker(){ var items=store.news.slice(0,18);
    var html=items.length?items.map(function(n){ return "<span><b>"+esc(n.source)+"</b>"+esc(n.title)+"</span>"; }).join("")
      :"<span>Headlines are quiet right now — checking again shortly.</span>";
    document.getElementById("tickerMove").innerHTML=html+html; }

  // ── feed list ──
  var byId={};
  function renderFeed(){
    var t=activeTypes(), all=[];
    if(t.quake)all=all.concat(store.quake); if(t.nat)all=all.concat(store.nat);
    if(t.crisis)all=all.concat(store.crisis); if(t.news)all=all.concat(store.news);
    all.sort(function(a,b){ return (b.time||0)-(a.time||0); });
    byId={}; all.forEach(function(x){ byId[x.id]=x; });
    var feed=document.getElementById("feed");
    if(!all.length){ feed.innerHTML='<div class="empty">No live items in the selected layers.</div>'; return; }
    feed.innerHTML=all.slice(0,90).map(function(x){
      var ico,meta;
      if(x.type==="quake"){ ico=x.mag.toFixed(1); meta='<span>'+esc(x.place||"")+'</span>'; }
      else if(x.type==="nat"){ ico="▲"; meta='<span><b>'+esc(x.kind||"Event")+'</b></span>'; }
      else if(x.type==="crisis"){ ico="!"; meta='<span><b>'+esc(x.kind||"Crisis")+'</b></span>'+(x.place?'<span>'+esc(x.place)+'</span>':''); }
      else { ico="▦"; meta='<span><b>'+esc(x.source)+'</b></span>'; }
      return '<div class="item '+x.type+(x.fresh?' fresh':'')+'" data-id="'+esc(x.id)+'">'+
        '<div class="ico">'+ico+'</div><div><div class="ttl">'+esc(x.title)+'</div>'+
        '<div class="meta">'+meta+'<span>'+ago(x.time||Date.now())+'</span></div></div></div>';
    }).join("");
    feed.querySelectorAll(".item").forEach(function(el){
      el.addEventListener("click", function(){ focusItem(el.getAttribute("data-id"), false); }); });
    document.getElementById("updated").textContent="updated "+new Date().toISOString().slice(11,16)+" UTC";
  }

  function focusItem(id, fromGlobe){
    var x=byId[id]; if(!x){ // maybe a globe point whose id is in a store
      ["quake","nat","crisis"].some(function(k){ var m=store[k].filter(function(s){return s.id===id;})[0]; if(m){x=m;return true;} }); }
    if(!x) return;
    if(x.lat!=null && x.lng!=null){
      world.controls().autoRotate=false; document.getElementById("rotateTxt").textContent="Hold";
      world.pointOfView({ lat:x.lat, lng:x.lng, altitude:1.4 }, 900);
    } else if(x.url){ window.open(x.url,"_blank"); }
  }

  document.querySelectorAll(".lyr").forEach(function(l){
    l.querySelector("input").addEventListener("change", function(){
      l.classList.toggle("off", !this.checked); paintGlobe(); renderFeed(); }); });

  function refresh(){
    setStatus("Updating…");
    Promise.all([loadQuakes(), loadNatural(), loadCrises(), loadNews()]).then(function(){
      paintGlobe(); renderFeed();
      var n=store.quake.length+store.nat.length+store.crisis.length+store.news.length;
      setStatus(n?"Live · "+n+" signals":"Live · waiting"); firstRun=false;
    });
  }
  document.getElementById("refreshBtn").addEventListener("click", refresh);
  refresh();
  setInterval(refresh, 180000);
  setInterval(function(){ if(!firstRun) renderFeed(); }, 30000);
})();
</script>
</body>
</html>
