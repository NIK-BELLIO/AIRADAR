<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Radar — Live World Monitor</title>
<meta name="description" content="A live war-room: earthquakes, humanitarian crises and breaking world headlines on one map, refreshed in real time." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prata&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --bg:#08080a; --panel:#101014; --panel-2:#15151b; --line:rgba(216,183,106,.16);
    --ink:#efe9dc; --muted:#9a9488; --gold:#d8b76a; --green:#35d07f;
    --quake:#e8a13a; --crisis:#e0564b; --news:#6aa9d8;
    --serif:'Prata',Georgia,serif; --sans:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);
    -webkit-font-smoothing:antialiased;overflow:hidden}
  a{color:inherit;text-decoration:none}

  /* ── command bar ── */
  .bar{display:flex;align-items:center;gap:16px;padding:12px 18px;
    border-bottom:1px solid var(--line);background:linear-gradient(180deg,#0c0c10,#08080a);
    position:relative;z-index:1200}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .brand .mark{width:30px;height:30px;border-radius:8px;flex:none;
    background:radial-gradient(circle at 30% 30%,#241d10,#0c0a06);
    border:1px solid rgba(216,183,106,.4);display:grid;place-items:center}
  .brand .mark::before{content:"";width:9px;height:9px;border-radius:50%;
    background:var(--green);box-shadow:0 0 0 0 rgba(53,208,127,.6);animation:pulse 1.8s infinite}
  .brand .t{font-family:var(--serif);font-size:19px;line-height:1;letter-spacing:.01em;white-space:nowrap}
  .brand .s{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-top:3px}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(53,208,127,.55)}70%{box-shadow:0 0 0 8px rgba(53,208,127,0)}100%{box-shadow:0 0 0 0 rgba(53,208,127,0)}}

  .bar .spacer{flex:1}
  .status{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
  .status .dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.8s infinite}
  .clock{font-variant-numeric:tabular-nums;font-weight:600;font-size:13px;letter-spacing:.04em}
  .btn{font:inherit;font-size:12.5px;font-weight:600;color:var(--ink);cursor:pointer;
    background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:9px;
    padding:8px 13px;display:inline-flex;align-items:center;gap:7px;transition:.18s}
  .btn:hover{background:rgba(216,183,106,.12);border-color:rgba(216,183,106,.4)}
  .btn.home{border-color:rgba(255,255,255,.1)}
  .btn .ic{width:14px;height:14px}

  /* ── layout ── */
  .wrap{display:flex;height:calc(100vh - 56px - 42px)}
  #map{flex:1;background:#06060a}
  .rail{width:380px;flex:none;border-left:1px solid var(--line);
    background:var(--panel);display:flex;flex-direction:column;min-height:0}

  /* layer toggles */
  .layers{display:flex;gap:8px;padding:12px 14px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .lyr{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;cursor:pointer;
    padding:6px 11px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.03);
    user-select:none;transition:.15s}
  .lyr input{display:none}
  .lyr .sw{width:9px;height:9px;border-radius:50%;flex:none}
  .lyr[data-k="quake"] .sw{background:var(--quake)}
  .lyr[data-k="crisis"] .sw{background:var(--crisis)}
  .lyr[data-k="news"] .sw{background:var(--news)}
  .lyr.off{opacity:.4}
  .lyr .ct{color:var(--muted);font-weight:500;font-variant-numeric:tabular-nums}

  /* feed */
  .feed-head{display:flex;align-items:baseline;justify-content:space-between;padding:14px 16px 8px}
  .feed-head h2{margin:0;font-family:var(--serif);font-size:16px;font-weight:400}
  .feed-head .sub{font-size:11px;color:var(--muted)}
  .feed{flex:1;overflow-y:auto;padding:2px 10px 16px}
  .feed::-webkit-scrollbar{width:8px}
  .feed::-webkit-scrollbar-thumb{background:rgba(216,183,106,.2);border-radius:8px}
  .item{display:grid;grid-template-columns:34px 1fr;gap:11px;padding:11px 8px;border-radius:11px;
    cursor:pointer;transition:.14s;border:1px solid transparent}
  .item:hover{background:rgba(216,183,106,.06);border-color:var(--line)}
  .item .ico{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex:none;
    font-weight:800;font-size:13px;font-variant-numeric:tabular-nums}
  .item.quake .ico{background:rgba(232,161,58,.14);color:var(--quake);border:1px solid rgba(232,161,58,.35)}
  .item.crisis .ico{background:rgba(224,86,75,.14);color:var(--crisis);border:1px solid rgba(224,86,75,.35)}
  .item.news .ico{background:rgba(106,169,216,.14);color:var(--news);border:1px solid rgba(106,169,216,.35)}
  .item .ttl{font-size:13.5px;line-height:1.34;font-weight:600;color:var(--ink);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .item .meta{font-size:11px;color:var(--muted);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap}
  .item .meta b{color:var(--gold);font-weight:600}
  .item.fresh{animation:flash 2.2s ease-out}
  @keyframes flash{0%{background:rgba(216,183,106,.16)}100%{background:transparent}}
  .empty{padding:30px 16px;text-align:center;color:var(--muted);font-size:13px;line-height:1.6}

  /* ticker */
  .ticker{height:42px;display:flex;align-items:center;gap:0;border-top:1px solid var(--line);
    background:linear-gradient(180deg,#0c0c10,#070709);overflow:hidden;position:relative;z-index:1200}
  .ticker .tag{flex:none;align-self:stretch;display:flex;align-items:center;gap:8px;padding:0 16px;
    background:var(--crisis);color:#1a0a08;font-weight:800;font-size:11.5px;letter-spacing:.12em;text-transform:uppercase}
  .ticker .tag .d{width:8px;height:8px;border-radius:50%;background:#1a0a08;animation:pulse2 1.2s infinite}
  @keyframes pulse2{50%{opacity:.3}}
  .ticker .track{flex:1;overflow:hidden;white-space:nowrap}
  .ticker .move{display:inline-block;padding-left:100%;animation:scroll 75s linear infinite}
  .ticker:hover .move{animation-play-state:paused}
  .ticker .move span{font-size:13px;color:var(--ink);margin:0 30px;opacity:.92}
  .ticker .move b{color:var(--gold);margin-right:8px;font-weight:700}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-100%)}}

  /* leaflet dark tweaks */
  .leaflet-container{background:#06060a;font-family:var(--sans)}
  .leaflet-popup-content-wrapper{background:#14141a;color:var(--ink);border:1px solid var(--line);
    border-radius:12px;box-shadow:0 14px 40px rgba(0,0,0,.6)}
  .leaflet-popup-tip{background:#14141a;border:1px solid var(--line)}
  .leaflet-popup-content{margin:13px 15px;font-size:13px;line-height:1.5}
  .leaflet-popup-content .pt{font-family:var(--serif);font-size:15px;margin-bottom:4px;display:block}
  .leaflet-popup-content a.more{color:var(--gold);font-weight:600;font-size:12px}
  .leaflet-control-attribution{background:rgba(8,8,10,.7)!important;color:#6a655c!important}
  .leaflet-control-attribution a{color:#8a8478!important}
  .leaflet-bar a{background:#14141a;color:var(--ink);border-color:var(--line)}
  .leaflet-bar a:hover{background:#20202a}
  .mk-pulse{border-radius:50%;animation:mk 2.4s ease-out infinite}
  @keyframes mk{0%{box-shadow:0 0 0 0 rgba(224,86,75,.5)}100%{box-shadow:0 0 0 22px rgba(224,86,75,0)}}

  @media (max-width:840px){
    .wrap{flex-direction:column;height:auto}
    #map{height:46vh}
    .rail{width:auto;border-left:none;border-top:1px solid var(--line)}
    .feed{max-height:40vh}
    .brand .s{display:none}
    body{overflow:auto}
  }
</style>
</head>
<body>
  <header class="bar">
    <a class="brand" href="index.html" title="Back to AI Radar">
      <span class="mark"></span>
      <span><span class="t">AI Radar</span><div class="s">Live World Monitor</div></span>
    </a>
    <span class="spacer"></span>
    <span class="status"><span class="dot"></span><span id="statusTxt">Connecting…</span></span>
    <span class="clock" id="clock">--:--:-- UTC</span>
    <button class="btn" id="refreshBtn" title="Refresh now">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/></svg>
      Refresh
    </button>
    <a class="btn home" href="index.html">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Site
    </a>
  </header>

  <div class="wrap">
    <div id="map"></div>
    <aside class="rail">
      <div class="layers" id="layers">
        <label class="lyr" data-k="quake"><input type="checkbox" checked><span class="sw"></span>Earthquakes <span class="ct" id="ctQuake">0</span></label>
        <label class="lyr" data-k="crisis"><input type="checkbox" checked><span class="sw"></span>Crises <span class="ct" id="ctCrisis">0</span></label>
        <label class="lyr" data-k="news"><input type="checkbox" checked><span class="sw"></span>Headlines <span class="ct" id="ctNews">0</span></label>
      </div>
      <div class="feed-head">
        <h2>Live feed</h2>
        <span class="sub" id="updated">—</span>
      </div>
      <div class="feed" id="feed">
        <div class="empty">Tuning the radar…</div>
      </div>
    </aside>
  </div>

  <div class="ticker">
    <span class="tag"><span class="d"></span>Wire</span>
    <div class="track"><div class="move" id="tickerMove"><span>Loading the latest world headlines…</span></div></div>
  </div>

<script>
(function(){
  "use strict";
  var PROXY = "https://api.allorigins.win/raw?url=";
  var map, layers = {}, store = { quake:[], crisis:[], news:[] }, seen = {}, firstRun = true;

  // ── map ──
  map = L.map("map", { worldCopyJump:true, zoomControl:true, attributionControl:true, minZoom:2 })
        .setView([24, 12], 2.4);
  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:"abcd", maxZoom:19
  }).addTo(map);
  layers.quake  = L.layerGroup().addTo(map);
  layers.crisis = L.layerGroup().addTo(map);

  // ── helpers ──
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]; }); }
  function ago(ts){
    var d = (Date.now()-ts)/1000; if(d<60) return Math.floor(d)+"s ago";
    if(d<3600) return Math.floor(d/60)+"m ago"; if(d<86400) return Math.floor(d/3600)+"h ago";
    return Math.floor(d/86400)+"d ago";
  }
  function setStatus(t){ document.getElementById("statusTxt").textContent = t; }

  // ── clock ──
  function tick(){
    var d = new Date();
    document.getElementById("clock").textContent =
      d.toISOString().slice(11,19) + " UTC";
  }
  setInterval(tick, 1000); tick();

  // ── EARTHQUAKES (USGS, CORS-friendly) ──
  function loadQuakes(){
    return fetch("https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/2.5_day.geojson")
      .then(function(r){ if(!r.ok) throw 0; return r.json(); })
      .then(function(j){
        layers.quake.clearLayers();
        var out = [];
        (j.features||[]).forEach(function(f){
          var c = f.geometry && f.geometry.coordinates; if(!c) return;
          var mag = f.properties.mag, lat = c[1], lon = c[0];
          var id = "q"+f.id, fresh = !seen[id]; seen[id]=1;
          var col = mag>=6 ? "#e0564b" : mag>=4.5 ? "#e8a13a" : "#d8b76a";
          var mk = L.circleMarker([lat,lon], {
            radius: Math.max(5, mag*2.4), color: col, weight:1.5,
            fillColor: col, fillOpacity:.32
          }).bindPopup('<span class="pt">M '+mag.toFixed(1)+' earthquake</span>'+
            esc(f.properties.place||"")+'<br><a class="more" target="_blank" href="'+
            f.properties.url+'">USGS details &rsaquo;</a>');
          mk._lat=lat; mk._lon=lon; layers.quake.addLayer(mk);
          out.push({ type:"quake", id:id, mag:mag, lat:lat, lon:lon, fresh:fresh,
            title:"M "+mag.toFixed(1)+" — "+(f.properties.place||"Unknown area"),
            place:f.properties.place||"", time:f.properties.time, url:f.properties.url, mk:mk });
        });
        store.quake = out;
        document.getElementById("ctQuake").textContent = out.length;
      })
      .catch(function(){ /* keep other sources */ });
  }

  // ── CRISES (ReliefWeb, free + CORS) ──
  function loadCrises(){
    var url = "https://api.reliefweb.int/v1/disasters?appname=airadar-monitor&preset=latest&limit=30"
      + "&fields[include][]=name&fields[include][]=status&fields[include][]=date.created"
      + "&fields[include][]=type.name&fields[include][]=primary_country.name"
      + "&fields[include][]=primary_country.location";
    return fetch(url)
      .then(function(r){ if(!r.ok) throw 0; return r.json(); })
      .then(function(j){
        layers.crisis.clearLayers();
        var out = [];
        (j.data||[]).forEach(function(d){
          var fl = d.fields||{}, loc = fl.primary_country && fl.primary_country.location;
          var lat = loc && (loc.lat!=null?loc.lat:(loc[0]&&loc[0].lat));
          var lon = loc && (loc.lon!=null?loc.lon:(loc[0]&&loc[0].lon));
          var id = "c"+d.id, fresh = !seen[id]; seen[id]=1;
          var when = fl.date && fl.date.created ? new Date(fl.date.created).getTime() : Date.now();
          var type = (fl.type && fl.type[0] && fl.type[0].name) || "Disaster";
          var country = (fl.primary_country && fl.primary_country.name) || "";
          var mk = null;
          if(lat!=null && lon!=null){
            mk = L.marker([lat,lon], { icon: L.divIcon({ className:"", iconSize:[16,16],
              html:'<div class="mk-pulse" style="width:16px;height:16px;background:#e0564b;'+
                   'border:2px solid #1a0a08;border-radius:50%"></div>' }) })
              .bindPopup('<span class="pt">'+esc(fl.name||"Crisis")+'</span>'+
                esc(type)+(country?(" &middot; "+esc(country)):"")+
                '<br><a class="more" target="_blank" href="https://reliefweb.int/disaster/'+
                esc(d.id)+'">ReliefWeb &rsaquo;</a>');
            mk._lat=lat; mk._lon=lon; layers.crisis.addLayer(mk);
          }
          out.push({ type:"crisis", id:id, lat:lat, lon:lon, fresh:fresh,
            title:fl.name||"Humanitarian crisis", place:country, kind:type,
            time:when, url:"https://reliefweb.int/disaster/"+d.id, mk:mk });
        });
        store.crisis = out;
        document.getElementById("ctCrisis").textContent = out.length;
      })
      .catch(function(){});
  }

  // ── HEADLINES (RSS via proxy) ──
  var FEEDS = [
    { name:"BBC", url:"https://feeds.bbci.co.uk/news/world/rss.xml" },
    { name:"Al Jazeera", url:"https://www.aljazeera.com/xml/rss/all.xml" }
  ];
  function loadNews(){
    return Promise.all(FEEDS.map(function(f){
      return fetch(PROXY + encodeURIComponent(f.url))
        .then(function(r){ if(!r.ok) throw 0; return r.text(); })
        .then(function(xml){
          var doc = new DOMParser().parseFromString(xml,"text/xml");
          return Array.prototype.slice.call(doc.querySelectorAll("item")).slice(0,14)
            .map(function(it){
              var g = function(t){ var n=it.querySelector(t); return n?n.textContent:""; };
              return { source:f.name, title:g("title"), link:g("link"),
                time:Date.parse(g("pubDate"))||Date.now() };
            });
        })
        .catch(function(){ return []; });
    })).then(function(lists){
      var all = [];
      lists.forEach(function(l){ all = all.concat(l); });
      all.sort(function(a,b){ return b.time-a.time; });
      store.news = all.slice(0,24).map(function(n,i){
        var id="n"+(n.link||n.title||i), fresh=!seen[id]; seen[id]=1;
        return { type:"news", id:id, title:n.title, source:n.source,
          time:n.time, url:n.link, fresh:fresh };
      });
      document.getElementById("ctNews").textContent = store.news.length;
      renderTicker();
    });
  }

  function renderTicker(){
    var items = store.news.slice(0,18);
    var html = items.length
      ? items.map(function(n){ return "<span><b>"+esc(n.source)+"</b>"+esc(n.title)+"</span>"; }).join("")
      : "<span>Headlines are quiet right now — checking again shortly.</span>";
    document.getElementById("tickerMove").innerHTML = html + html; // duplicate for seamless loop
  }

  // ── unified feed ──
  function activeTypes(){
    var t={}; document.querySelectorAll(".lyr").forEach(function(l){
      t[l.getAttribute("data-k")] = l.querySelector("input").checked; }); return t;
  }
  function renderFeed(){
    var t = activeTypes();
    var all = [];
    if(t.quake)  all = all.concat(store.quake);
    if(t.crisis) all = all.concat(store.crisis);
    if(t.news)   all = all.concat(store.news);
    all.sort(function(a,b){ return (b.time||0)-(a.time||0); });

    var feed = document.getElementById("feed");
    if(!all.length){ feed.innerHTML = '<div class="empty">No live items in the selected layers.<br>Try enabling more layers above.</div>'; return; }
    feed.innerHTML = all.slice(0,80).map(function(x){
      var ico, meta;
      if(x.type==="quake"){ ico = x.mag.toFixed(1);
        meta = '<span>'+esc(x.place||"")+'</span>'; }
      else if(x.type==="crisis"){ ico = "!";
        meta = '<span><b>'+esc(x.kind||"Crisis")+'</b></span>'+(x.place?'<span>'+esc(x.place)+'</span>':''); }
      else { ico = "▦"; meta = '<span><b>'+esc(x.source)+'</b></span>'; }
      return '<div class="item '+x.type+(x.fresh?' fresh':'')+'" data-id="'+esc(x.id)+'">'+
        '<div class="ico">'+ico+'</div><div><div class="ttl">'+esc(x.title)+'</div>'+
        '<div class="meta">'+meta+'<span>'+ago(x.time||Date.now())+'</span></div></div></div>';
    }).join("");

    // wire clicks
    var byId = {}; all.forEach(function(x){ byId[x.id]=x; });
    feed.querySelectorAll(".item").forEach(function(el){
      el.addEventListener("click", function(){
        var x = byId[el.getAttribute("data-id")];
        if(!x) return;
        if(x.lat!=null && x.lon!=null){
          map.flyTo([x.lat,x.lon], Math.max(map.getZoom(),5), { duration:.8 });
          if(x.mk) x.mk.openPopup();
        } else if(x.url){ window.open(x.url,"_blank"); }
      });
    });
    var d = new Date();
    document.getElementById("updated").textContent = "updated "+d.toISOString().slice(11,16)+" UTC";
  }

  // layer toggles
  document.querySelectorAll(".lyr").forEach(function(l){
    l.querySelector("input").addEventListener("change", function(){
      var k = l.getAttribute("data-k"), on = this.checked;
      l.classList.toggle("off", !on);
      if(layers[k]){ on ? map.addLayer(layers[k]) : map.removeLayer(layers[k]); }
      renderFeed();
    });
  });

  // ── refresh cycle ──
  function refresh(){
    setStatus("Updating…");
    Promise.all([loadQuakes(), loadCrises(), loadNews()]).then(function(){
      renderFeed();
      var n = store.quake.length + store.crisis.length + store.news.length;
      setStatus(n ? "Live · "+n+" signals" : "Live · waiting for signals");
      firstRun = false;
    });
  }
  document.getElementById("refreshBtn").addEventListener("click", refresh);
  refresh();
  setInterval(refresh, 180000);          // every 3 min
  setInterval(function(){ if(!firstRun) renderFeed(); }, 30000); // refresh "x ago" labels
})();
</script>
</body>
</html>
